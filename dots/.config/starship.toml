# Don't print a new line at the start of the prompt
add_newline = false
# Pipes ╰─ ╭─
# Powerline symbols                                    
# Wedges 🭧🭒 🭣🭧🭓
# Random noise 🬖🬥🬔🬗
# Cool stuff 󰜥   

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory $git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:245'

# Replace the "❯" symbol in the prompt with "➜"
[character]                            # The name of the module we are configuring is "character"
#success_symbol = "[ ]( fg:243)"
#error_symbol = "[ ]( fg:244)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg: 252"
symbol = "󰘬"
truncation_length = 12
truncation_symbol = ""
format = " 󰜥 []( fg:252)[$symbol $branch(:$remote_branch)](fg:235 bg:252)[ ]( fg:252)"

[git_commit]
commit_hash_length = 4
tag_symbol = " "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING]( red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](green)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format =  "[•$hostname](bg:252  fg:235)[]( fg:252)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = " dimmed green"

[time]
disabled = true
format = '🕙[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = " bg:252 fg:235"
style_root = "red "
format = "[]( fg:252)[$user]($style)"
disabled = false
show_always = true

[directory]
#home_symbol = " "
read_only = "  "
style = "bg:255 fg:240"
truncation_length = 2
truncation_symbol = ".../"
format = '[]( fg:255)[$path]($style)[]( fg:255)'


#[directory.substitutions]
#"Desktop" = "  "
#"Documents" = "  "
#"Downloads" = "  "
#"Music" = " 󰎈 "
#"Pictures" = "  "
#"Videos" = "  "
#"GitHub" = " 󰊤 "

[cmd_duration]
min_time = 0
format = '[]( fg:252)[$duration]( bg:252 fg:235)[]( fg:252)'
